<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>ใส่ชื่อตัวเอง</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
  <div class="main-title">ใส่ชื่อตัวเอง</div>
  <div class="sub-title">ใส่ชื่องาน (AR)</div>
</header>

<!-- งานที่ 1 -->
<div class="ar-section">
  <div class="head-title">Mingpu</div>
  <div class="sub-title">Concept design from Thai grilled pork (หมูปิ้ง)</div>

  <model-viewer
    id="model1"
    src="AR.glb"
    ios-src="AR.usdz"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    environment-image="neutral"
    loading="eager"
    style="width:100%; height:400px;">
  </model-viewer>

  <button class="ar-button" onclick="triggerAR('model1')">Play AR</button>
</div>


<!-- งานที่ 2 -->
<div class="ar-section">
  <div class="head-title">Sinual</div>
  <div class="sub-title">Inspired by Thai street food</div>
  <div class="sub-title">"Red Sausages" (ไส้กรอกแดง) Idea: Cat + Sausage</div>

  <model-viewer
    id="model2"
    src="AR2.glb"
    ios-src="AR2.usdz"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    environment-image="neutral"
    loading="eager"
    style="width:100%; height:400px;">
  </model-viewer>

  <button class="ar-button" onclick="triggerAR('model2')">Play AR</button>
</div>


<footer>
  <div class="footer-link">
    <strong>Facebook:</strong>
    <a href="https://www.facebook.com/mushroomsstudio" target="_blank">
      facebook.com/mushroomsstudio
    </a>
  </div>

  <div class="footer-link">
    <strong>Website:</strong>
    <a href="https://www.mushroom-studio.com" target="_blank">
      mushroom-studio.com
    </a>
  </div>
</footer>


<!-- โหลด model-viewer -->
<script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<script>
function triggerAR(id) {
  const viewer = document.getElementById(id);

  if (!viewer) {
    alert("ไม่พบโมเดล");
    return;
  }

  if (viewer.canActivateAR) {
    viewer.activateAR();
  } else {
    alert("อุปกรณ์หรือเบราว์เซอร์นี้ไม่รองรับ AR\nลองกดปุ่ม AR ที่มุมขวาของโมเดลแทน");
  }
}
</script>

</body>
</html>
